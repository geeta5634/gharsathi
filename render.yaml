services:
  - type: web
    name: gharsathi
    env: node
    region: singapore
    buildCommand: cd server && npm install
    startCommand: node server/src/server.js
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /data/gharsathi.db
      - key: JWT_SECRET
        generateValue: true
      - key: SMS_PROVIDER
        value: console
    disk:
      name: gharsathi-data
      mountPath: /data
      sizeGB: 1
