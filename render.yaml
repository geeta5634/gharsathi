services:
  - type: web
    name: gharsathi-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: gharsathi-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://gharsathi-frontend.onrender.com

databases:
  - name: gharsathi-db
    plan: free
    databaseName: gharsathi
    user: gharsathi_user
