services:
  - type: web
    name: gharsathi
    env: node
    region: singapore
    buildCommand: cd server && npm install
    startCommand: node server/src/server.js
    healthCheckPath: /api/ping
    envVars:
      - key: NODE_ENV
        value: production
      - key: TURSO_DATABASE_URL
        value: libsql://gharsathi-geeta5634.aws-ap-south-1.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: SMS_PROVIDER
        value: console
      - key: SEED_PASSWORD
        generateValue: true
      - key: CORS_ORIGINS
        value: *
