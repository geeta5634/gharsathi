version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: gharsathi-db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: gharsathi

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: gharsathi-api
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/gharsathi
      - JWT_SECRET=${JWT_SECRET:-gharsathi_super_secret_key_2024}
      - JWT_EXPIRE=7d
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: gharsathi-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:5000/api
      - NEXT_PUBLIC_RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
    depends_on:
      - backend

volumes:
  mongo_data:
